# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── DataSource (PostgreSQL) ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/medicluz
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
# IMPORTANTE: reemplazar con variable de entorno en produccion
app.jwt.secreto=3d2f8a1b9c4e7f0123456789abcdef0123456789abcdef0123456789abcdef12
app.jwt.expiracion-acceso-ms=900000
app.jwt.expiracion-refresco-ms=604800000

# ─── Límites de peticiones ────────────────────────────────────────────────────
app.limite.autenticacion=10
app.limite.general=120

# ─── Springdoc / Swagger ──────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.medicluz=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
